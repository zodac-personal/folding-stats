networks:
  development:
    name: development
    driver: bridge

services:

  frontend-dev:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        # Build arguments
        FORUM_LINK: "https://extremehw.net/forum/125-extreme-team-folding"
        REST_ENDPOINT_URL: "https://127.0.0.1:8443/folding"
        ROOT_URL: "https://127.0.0.1:443"
        TITLE: "Extreme Team Folding"
        UPDATE_ENABLED: "false"
    container_name: frontend-dev
    hostname: frontend-dev
    depends_on:
      backend-dev:
        # TODO: [Reverse Proxy] Disable dev healthcheck
        condition: service_started
    environment:
      # These are used by nginx envsubst at container startup
      NGINX_BACKEND_HOSTNAME: "backend-dev"
      NGINX_FRONTEND_URL: "127.0.0.1"
      NGINX_ENABLE_BACKEND_VHOST: "false"
    networks:
      - development
    ports:
      - "80:80"
      - "443:443"
    restart: "no"
    volumes:
      - ./docker/frontend/certs:/usr/local/certs/stats/:ro

  backend-dev:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: backend-dev
    hostname: backend-dev
    depends_on:
      database-dev:
        condition: service_healthy
    environment:
      # External URL configuration
      LARS_URL_ROOT: "https://backend-dev:8443/folding"
      STATS_URL_ROOT: "https://backend-dev:8443/folding"
      REDIRECT_URL: "https://127.0.0.1:443"
      # Spring configuration
      LOG_LEVEL: "INFO"
      DEPLOYMENT_TYPE: "test"
      JVM_MAX: "512m"
      JVM_MIN: "128m"
      MULTIPLE_LOG_FILES: "false"
      # TODO: [Reverse Proxy] Need to enable SSL on the Spring Boot level
      SERVER_SSL_KEY_STORE_PASSWORD: "${KEYSTORE_PASSWORD}"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://database-dev:5432/folding_db"
      SPRING_DATASOURCE_DRIVER: "org.postgresql.Driver"
      SPRING_DATASOURCE_USERNAME: "folding_user"
      SPRING_DATASOURCE_PASSWORD: "shroot"
      SPRING_DATASOURCE_DATABASE_TYPE: "postgresql"
      # Application config
      # NOTE: The monthly reset, result storage and LARS update will always occur at 23:57:00 on the last day of the month
      ENABLE_LARS_HARDWARE_UPDATE: "false"
      ENABLE_MONTHLY_RESULT_STORAGE: "false"
      ENABLE_STATS_MONTHLY_RESET: "false"
      # Stats parsing configuration
      MAXIMUM_HTTP_REQUEST_ATTEMPTS: "3"
      SECONDS_BETWEEN_HTTP_REQUEST_ATTEMPTS: "0"
      STATS_SCHEDULED_PARSING_ENABLED: "false"
      # Security configuration, default user
      SPRING_SECURITY_USER_NAME: "root"
      SPRING_SECURITY_USER_PASSWORD: "shroot"
      SPRING_SECURITY_USER_ROLES: "ADMIN"
      # Category configuration
      USERS_IN_AMD_GPU: "1"
      USERS_IN_NVIDIA_GPU: "1"
      USERS_IN_WILDCARD: "1"
      # Swagger documentation
      CONTACT_NAME: "zodac"
      FORUM_LINK: "https://extremehw.net/forum/125-extreme-team-folding"
      REST_ENDPOINT_URL: "https://127.0.0.1:8443/folding"
    # TODO: [Reverse Proxy] Disable dev healthcheck
    healthcheck:
      test: [ "NONE" ]
    networks:
      - development
    ports:
      # TODO: [Reverse Proxy] Need to keep legacy port
      # - "8080:8080"
      - "8443:8443"
    restart: "no"
    volumes:
      - ./docker/frontend/certs/folding-stats.p12:/usr/local/certs/stats/folding-stats.p12:ro

  database-dev:
    build:
      context: .
      dockerfile: docker/database/Dockerfile
      args:
        # Build arguments
        ADMIN_USERNAME: "root"
        ADMIN_PASSWORD: "shroot"
        READ_ONLY_USERNAME: "root2"
        READ_ONLY_PASSWORD: "shroot2"
        POSTGRES_USER: "folding_user"
    container_name: database-dev
    hostname: database-dev
    environment:
      # First 4 variables used to configure DB
      POSTGRES_DB: "folding_db"
      POSTGRES_USER: "folding_user"
      POSTGRES_PASSWORD: "shroot"
      POSTGRES_PORT: "5432"
      PGDATA: "/var/lib/postgresql/system/data"
      # Next 3 variables needed to avoid "FATAL role 'root' does not exist" error
      PGDATABASE: "folding_db"
      PGUSER: "folding_user"
      PGPASSWORD: "shroot"
    networks:
      - development
    ports:
      - "5433:5432"
    restart: "no"

  selenium-chrome:
    image: selenium/standalone-chrome:145.0  # https://hub.docker.com/r/selenium/standalone-chrome/tags
    container_name: selenium-chrome
    hostname: selenium-chrome
    depends_on:
      - frontend-dev
    networks:
      - development
    ports:
      - "4444:4444"
    restart: "no"

  selenium-firefox:
    image: selenium/standalone-firefox:148.0-20260222  # https://hub.docker.com/r/selenium/standalone-firefox/tags
    container_name: selenium-firefox
    hostname: selenium-firefox
    depends_on:
      - frontend-dev
    networks:
      - development
    ports:
      - "4445:4444"
    restart: "no"
