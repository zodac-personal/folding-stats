# The application.properties that is common to all environments, but defines properties for Swagger documentation only
application.version=@project.version@
springdoc.api-docs.enabled=true
#springdoc.api-docs.path=/api-docs Using default path: <context>/v3/api-docs
springdoc.default-consumes-media-type=application/json
springdoc.default-produces-media-type=application/json
springdoc.override-with-generic-response=false
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
#springdoc.swagger-ui.path=true  # Using default path: <context>/swagger-ui/index.html or <context>/swagger-ui.html
springdoc.swagger-ui.tagsSorter=alpha
springdoc.writer-with-default-pretty-printer=true
springdoc.writer-with-order-by-keys=true
